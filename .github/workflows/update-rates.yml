name: Update Rates

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Run scraper
        run: python scripts/update.py
      - name: Commit updated rates
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update rates"
          add: "public/rates.json public/counselor.json public/fss.json public/market-rates.json public/fss-rates.json"
          default_author: github_actions
