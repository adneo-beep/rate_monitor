name: Update Counselor Rates

on:
  schedule:
    - cron: "0 2 * * 1"   # 매주 월요일 11:00 KST (02:00 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Run counselor scraper
        run: python scripts/update.py --counselor-only
      - name: Commit counselor rates
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update counselor rates (weekly)"
          add: "public/counselor.json"
          default_author: github_actions
